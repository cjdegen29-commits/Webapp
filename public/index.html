<!DOCTYPE html>
<html>
<head>
    <title>Receipt Scanner</title>
    <link rel="stylesheet" href="Website.css">
</head>
<body>

<div class="container">

    <h1>Scan Receipts</h1>

    <div id="auth-section">
        <p class="helper-text"><strong>Step 1:</strong> Authorize Google Sheets to enable exporting.</p>
        <a href="/api/auth/login" id="auth-link">Authorize Google Sheets</a>
    </div>

    <div id="workbook-section" hidden>
        <p class="helper-text"><strong>Step 1:</strong> Select Target Workbook</p>
        <select id="workbook-select">
            <option value="">Loading workbooks...</option>
        </select>
    </div>

    <div>
        <p class="helper-text"><strong>Step 2:</strong> Scan or Upload Receipts (Summary, Gross Profit, Payments)</p>
        <form id="ocr-form">
            <input type="file" id="receiptInput" accept="image/*" capture="environment" multiple hidden>
            
            <button type="button" id="add-photo-btn">Add Receipt Page(s)</button>
            
            <div id="preview-container"></div>
            
            <button type="submit" id="submit-btn" disabled>Process Receipts</button>
        </form>
    </div>

    <img id="preview" width="300">

    <p id="statusBox"></p>

    <div id="result-section" hidden>
        <p class="helper-text"><strong>Step 3:</strong> Review and edit the extracted data.</p>
        <textarea id="json-output"></textarea>
        
        <button id="export-btn">Confirm & Send to Sheets</button>
    </div>
</div>
<script src="Website.js"></script>
<script src="brandmar-api.js"></script>

</body>
</html>
